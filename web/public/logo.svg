<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Circular coin shape -->
  <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none"/>
  
  <!-- Stylized E made of horizontal lines (like train tracks/rails) -->
  <path d="M16 14h16M16 24h12M16 34h16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Vertical bar of the E -->
  <path d="M16 14v20" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Small return arrow (money back) -->
  <path d="M36 20l4-4m0 0l-4-4m4 4H32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
