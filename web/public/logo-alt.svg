<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Train track / rail abstraction forming an E rotated to suggest forward motion -->
  <!-- Two parallel vertical rails -->
  <rect x="8" y="6" width="4" height="28" rx="2" fill="currentColor"/>
  <rect x="18" y="6" width="4" height="28" rx="2" fill="currentColor"/>
  
  <!-- Three horizontal ties/sleepers -->
  <rect x="6" y="10" width="18" height="3" rx="1.5" fill="currentColor"/>
  <rect x="6" y="18.5" width="14" height="3" rx="1.5" fill="currentColor"/>
  <rect x="6" y="27" width="18" height="3" rx="1.5" fill="currentColor"/>
  
  <!-- Return/refund arrow -->
  <path d="M28 15l6-6m0 0v5m0-5h-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
