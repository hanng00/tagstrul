AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Tagersattning — API substack

Parameters:
  TableName:
    Type: String
  TableArn:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoUserPoolArn:
    Type: String
  CognitoClientId:
    Type: String

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs22.x
    CodeUri: ..
    Environment:
      Variables:
        TABLE_NAME: !Ref TableName
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref CognitoClientId

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn

  # --- Routes ---

  GetRoutes:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/routes/GetRoutes.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /routes
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  PostRoute:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/routes/PostRoute.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /routes
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  DeleteRoute:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/routes/DeleteRoute.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /routes/{routeId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  # --- Delays ---

  GetDelays:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/delays/GetDelays.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /delays
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  DismissDelay:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/delays/DismissDelay.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /delays/{delayId}/dismiss
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  # --- Claims ---

  GetClaims:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/GetClaims.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  PostClaim:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/PostClaim.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  StartClaim:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/StartClaim.handler
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims/start
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  SubmitContact:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/SubmitContact.handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims/contact
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  SubmitBank:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/SubmitBank.handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims/bank
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  ConfirmClaim:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/ConfirmClaim.handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims/confirm
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  UpdateClaimStatus:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/claims/UpdateClaimStatus.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /claims/{claimId}/status
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  # --- Profile ---

  GetProfile:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/profile/GetProfile.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  PutProfile:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/profile/PutProfile.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  # --- Movingo Cards ---

  GetMovingoCards:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/movingo/GetMovingoCards.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /movingo-cards
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  PostMovingoCard:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/movingo/PostMovingoCard.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /movingo-cards
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  DeleteMovingoCard:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/movingo/DeleteMovingoCard.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /movingo-cards/{cardId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  # --- Donations (unauthenticated) ---

  CreateDonationCheckout:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/donations/CreateCheckout.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /public/donations/checkout
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  # --- Public (unauthenticated) ---

  EstimateCompensation:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/public/EstimateCompensation.handler
      Timeout: 60
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /public/estimate
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"
