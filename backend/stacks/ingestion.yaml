AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Tagersattning — Ingestion substack

Parameters:
  TableName:
    Type: String
  TableArn:
    Type: String
  TableStreamArn:
    Type: String
  VapidPublicKey:
    Type: String
  VapidPrivateKey:
    Type: String
    NoEcho: true

Globals:
  Function:
    Timeout: 120
    MemorySize: 512
    Runtime: nodejs22.x
    CodeUri: ..
    Environment:
      Variables:
        TABLE_NAME: !Ref TableName
        VAPID_PUBLIC_KEY: !Ref VapidPublicKey
        VAPID_PRIVATE_KEY: !Ref VapidPrivateKey

Resources:
  PollTrainData:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/ingestion/PollTrainData.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(6 hours)
            State: ENABLED
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true

  PollUserRoutes:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/features/ingestion/PollUserRoutes.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !Ref TableStreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 10
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["INSERT"], "dynamodb": {"NewImage": {"SK": {"S": [{"prefix": "ROUTE#"}]}}}}'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true
