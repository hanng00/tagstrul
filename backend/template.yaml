AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Tagersattning — parent stack

Parameters:
  VapidPublicKey:
    Type: String
    Description: VAPID public key for web push notifications
  VapidPrivateKey:
    Type: String
    Description: VAPID private key for web push notifications
    NoEcho: true

Resources:
  # ========== Shared infrastructure ==========

  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-pre-signup"
      Runtime: nodejs20.x
      Handler: index.handler
      InlineCode: |
        exports.handler = async (event) => {
          event.response.autoConfirmUser = true;
          event.response.autoVerifyEmail = true;
          return event;
        };

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PreSignUpFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-user-pool"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      UserPoolTier: ESSENTIALS
      Schema:
        - { Name: email, Required: true, Mutable: true }
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: false
          RequireUppercase: false
          RequireNumbers: false
          RequireSymbols: false
        SignInPolicy:
          AllowedFirstAuthFactors: [PASSWORD, EMAIL_OTP]
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows: [ALLOW_USER_AUTH, ALLOW_REFRESH_TOKEN_AUTH]

  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  # ========== Child stacks ==========

  ApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/api.yaml
      Parameters:
        TableName: !Ref Table
        TableArn: !GetAtt Table.Arn
        CognitoUserPoolId: !Ref CognitoUserPool
        CognitoUserPoolArn: !GetAtt CognitoUserPool.Arn
        CognitoClientId: !Ref CognitoUserPoolClient
        VapidPublicKey: !Ref VapidPublicKey

  IngestionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/ingestion.yaml
      Parameters:
        TableName: !Ref Table
        TableArn: !GetAtt Table.Arn
        TableStreamArn: !GetAtt Table.StreamArn
        VapidPublicKey: !Ref VapidPublicKey
        VapidPrivateKey: !Ref VapidPrivateKey

Outputs:
  CognitoUserPoolId: { Value: !Ref CognitoUserPool }
  CognitoUserPoolClientId: { Value: !Ref CognitoUserPoolClient }
  TableName: { Value: !Ref Table }
  ApiEndpoint:
    Value: !GetAtt ApiStack.Outputs.ApiEndpoint
